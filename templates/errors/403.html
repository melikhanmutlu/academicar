{% extends "base.html" %}
{% block title %}Access Denied - AcademicAR{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-16 text-center">
  <h1 class="font-serif text-3xl font-bold text-academic-900 mb-3">Access denied</h1>
  <p class="text-gray-600 mb-6">You do not have permission to open this page or file.</p>
  <a href="{{ url_for('dashboard') if current_user.is_authenticated else url_for('landing') }}" class="inline-block bg-academic-700 hover:bg-academic-800 text-white px-5 py-2.5 rounded-md font-semibold">Go back</a>
</div>
{% endblock %}
